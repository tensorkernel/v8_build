name: ANGLE Linux Debug, ASan, and UBSan (v4)

on:
  workflow_dispatch:
    inputs:
      angle_ref:
        description: "ANGLE branch, tag, or commit SHA"
        required: true
        default: "refs/heads/main"
        type: string
      symbol_level:
        description: "Debug-symbol level (2 is best for security research)"
        required: true
        default: "2"
        type: choice
        options:
          - "2"
          - "1"
      retention_days:
        description: "Artifact retention period"
        required: true
        default: "7"
        type: choice
        options:
          - "3"
          - "7"
          - "14"
          - "30"

permissions:
  contents: read

concurrency:
  group: angle-linux-build
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  DEPOT_TOOLS_DIR: ${{ github.workspace }}/depot_tools
  CHECKOUT_ROOT: ${{ github.workspace }}/checkout
  # `fetch angle` checks ANGLE out directly into the current directory.
  ANGLE_SRC: ${{ github.workspace }}/checkout
  ARCHIVE_DIR: ${{ github.workspace }}/artifacts
  LOG_DIR: ${{ github.workspace }}/build-logs
  ANGLE_REF: ${{ inputs.angle_ref }}
  SYMBOL_LEVEL: ${{ inputs.symbol_level }}
  DEPOT_TOOLS_UPDATE: "0"
  GCLIENT_PY3: "1"
  NINJA_STATUS: "[%r processes, %f/%t @ %o/s, %es elapsed] "

jobs:
  build:
    name: Sequential Linux x64 builds
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Show runner resources
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          lscpu
          free -h
          df -h
          echo "CPU jobs: $(nproc --all)"

      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune --all --force --volumes || true
          sudo apt-get clean
          df -h

      - name: Install bootstrap packages
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ca-certificates \
            curl \
            git \
            lsb-release \
            p7zip-full \
            python3 \
            python3-pip \
            xz-utils
          sudo apt-get clean

      - name: Install and bootstrap depot_tools
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            "$DEPOT_TOOLS_DIR"

          echo "$DEPOT_TOOLS_DIR" >> "$GITHUB_PATH"
          export PATH="$DEPOT_TOOLS_DIR:$PATH"

          # DEPOT_TOOLS_UPDATE=0 intentionally prevents depot_tools from
          # changing revision during the job. It also disables automatic
          # bootstrap, so initialize the bundled Python/CIPD tools explicitly.
          "$DEPOT_TOOLS_DIR/ensure_bootstrap"

          test -s "$DEPOT_TOOLS_DIR/python3_bin_reldir.txt"
          test -x "$DEPOT_TOOLS_DIR/python-bin/python3"

          "$DEPOT_TOOLS_DIR/python-bin/python3" --version
          command -v gclient
          command -v autoninja

          # Do not execute depot_tools/gn yet. It is only a dispatcher and
          # requires ANGLE's real GN binary, downloaded later by gclient sync.
          test -x "$DEPOT_TOOLS_DIR/gn"

          {
            echo "depot_tools commit: $(git -C "$DEPOT_TOOLS_DIR" rev-parse HEAD)"
            echo "python3_bin_reldir: $(cat "$DEPOT_TOOLS_DIR/python3_bin_reldir.txt")"
            echo "gclient: $(command -v gclient)"
            echo "autoninja: $(command -v autoninja)"
            echo "depot_tools GN dispatcher: $DEPOT_TOOLS_DIR/gn"
          } | tee "$RUNNER_TEMP/depot-tools-bootstrap.txt"

      - name: Fetch latest requested ANGLE revision
        id: source
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$DEPOT_TOOLS_DIR:$PATH"

          mkdir -p "$CHECKOUT_ROOT" "$ARCHIVE_DIR" "$LOG_DIR"
          cd "$ANGLE_SRC"
          fetch --nohooks angle

          # `fetch angle` uses a gclient solution named ".", so the repository
          # is the checkout directory itself, not a nested checkout/angle path.
          test -d "$ANGLE_SRC/.git"
          test -f "$ANGLE_SRC/DEPS"
          echo "ANGLE source root: $ANGLE_SRC"
          gclient root
          git status --short

          git fetch --force origin "$ANGLE_REF"
          git checkout --detach FETCH_HEAD

          # Record the resolved source revision before long dependency setup so
          # diagnostics and failure artifacts still carry the exact commit.
          commit="$(git rev-parse HEAD)"
          short_commit="$(git rev-parse --short=12 HEAD)"
          commit_time="$(git show -s --format=%cI HEAD)"
          subject="$(git show -s --format=%s HEAD)"

          {
            echo "commit=$commit"
            echo "short_commit=$short_commit"
            echo "commit_time=$commit_time"
          } >> "$GITHUB_OUTPUT"

          {
            echo "ANGLE_COMMIT=$commit"
            echo "ANGLE_SHORT_COMMIT=$short_commit"
            echo "ANGLE_COMMIT_TIME=$commit_time"
          } >> "$GITHUB_ENV"

          gclient sync \
            --nohooks \
            --delete_unversioned_trees \
            --force

          # depot_tools/gn is a dispatcher. The actual GN executable belongs
          # to the ANGLE checkout and is installed by the no-hooks sync above.
          # Put the real binary first so hooks such as configure_siso.py can
          # execute `gn --version` without recursing into the dispatcher.
          GN_DIR="$ANGLE_SRC/buildtools/linux64"
          GN_BIN="$GN_DIR/gn"
          test -x "$GN_BIN"
          export PATH="$GN_DIR:$DEPOT_TOOLS_DIR:$PATH"
          echo "$GN_DIR" >> "$GITHUB_PATH"
          echo "GN_BIN=$GN_BIN" >> "$GITHUB_ENV"

          echo "Real ANGLE GN: $GN_BIN"
          "$GN_BIN" --version
          which -a gn || true

          ./build/install-build-deps.sh --no-prompt --no-syms
          gclient runhooks

          # Fail here with a focused diagnostic rather than much later in GN.
          test -s "$DEPOT_TOOLS_DIR/python3_bin_reldir.txt"
          test -x "$DEPOT_TOOLS_DIR/python-bin/python3"
          test -x "$GN_BIN"
          "$GN_BIN" --version
          gn --version
          autoninja --version

          {
            echo "## ANGLE source"
            echo
            echo "- Ref requested: \`$ANGLE_REF\`"
            echo "- Commit: \`$commit\`"
            echo "- Commit time: \`$commit_time\`"
            echo "- Subject: $subject"
            echo "- Runner CPUs: \`$(nproc --all)\`"
          } >> "$GITHUB_STEP_SUMMARY"

          git status --short
          df -h

      - name: Create sequential build helper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/build-angle-config.sh" <<'SCRIPT'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          config="${1:?usage: build-angle-config.sh <debug|asan|ubsan>}"
          jobs="$(nproc --all)"
          gn_bin="${GN_BIN:-$ANGLE_SRC/buildtools/linux64/gn}"
          test -x "$gn_bin"
          out_rel="out/$config"
          out_dir="$ANGLE_SRC/$out_rel"
          archive="$ARCHIVE_DIR/angle-${config}-linux-x64-${ANGLE_SHORT_COMMIT}.zip"
          log_file="$LOG_DIR/${config}.log"
          args_file="$LOG_DIR/${config}.args.gn"

          common_args=$(cat <<EOF
          target_cpu = "x64"
          is_component_build = false
          is_official_build = false
          use_remoteexec = false
          use_siso = false
          symbol_level = ${SYMBOL_LEVEL}
          EOF
          )

          case "$config" in
            debug)
              gn_args=$(cat <<EOF
          ${common_args}
          is_debug = true
          angle_assert_always_on = true
          dcheck_always_on = true
          EOF
              )
              ;;
            asan)
              gn_args=$(cat <<EOF
          ${common_args}
          is_debug = false
          is_asan = true
          angle_assert_always_on = true
          dcheck_always_on = true
          EOF
              )
              ;;
            ubsan)
              gn_args=$(cat <<EOF
          ${common_args}
          is_debug = false
          is_ubsan = true
          is_ubsan_no_recover = true
          angle_assert_always_on = true
          dcheck_always_on = true
          EOF
              )
              ;;
            *)
              echo "Unknown configuration: $config" >&2
              exit 2
              ;;
          esac

          mkdir -p "$out_dir" "$ARCHIVE_DIR" "$LOG_DIR"
          printf '%s\n' "$gn_args" > "$args_file"

          {
            echo "===== ANGLE $config configuration ====="
            echo "Commit: $ANGLE_COMMIT"
            echo "Jobs: $jobs"
            echo "Output: $out_dir"
            echo
            echo "$gn_args"
          } | tee "$log_file"

          cd "$ANGLE_SRC"

          "$gn_bin" gen "$out_rel" --args="$gn_args" 2>&1 | tee -a "$log_file"
          "$gn_bin" args "$out_rel" --list > "$out_dir/GN_ARGS_EXPANDED.txt"

          autoninja -C "$out_rel" -j "$jobs" 2>&1 | tee -a "$log_file"

          test -s "$out_dir/libEGL.so"
          test -s "$out_dir/libGLESv2.so"

          cat > "$out_dir/BUILD_INFO.txt" <<EOF
          ANGLE commit: $ANGLE_COMMIT
          ANGLE commit time: $ANGLE_COMMIT_TIME
          GN binary: $gn_bin
          GN version: $($gn_bin --version)
          Configuration: $config
          Target OS: linux
          Target CPU: x64
          Parallel jobs: $jobs
          Runner: ${RUNNER_NAME:-unknown}
          Runner OS: ${RUNNER_OS:-unknown}
          Runner architecture: ${RUNNER_ARCH:-unknown}
          Built UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

          find "$out_dir" -maxdepth 1 -type f -printf '%f\t%s bytes\n' \
            | sort > "$out_dir/TOP_LEVEL_FILES.txt"

          rm -f "$archive" "$archive.sha256"
          7z a -tzip -mx=1 -mmt=on "$archive" "$out_rel"
          sha256sum "$archive" | tee "$archive.sha256"

          archive_size="$(du -h "$archive" | cut -f1)"
          {
            echo
            echo "### ${config^^}"
            echo
            echo "- Archive: \`$(basename "$archive")\`"
            echo "- Size: \`$archive_size\`"
            echo "- SHA-256: \`$(cut -d' ' -f1 "$archive.sha256")\`"
          } >> "$GITHUB_STEP_SUMMARY"

          rm -rf "$out_dir"
          df -h
          SCRIPT

          chmod +x "$RUNNER_TEMP/build-angle-config.sh"

      - name: Build and package Debug
        shell: bash
        run: "$RUNNER_TEMP/build-angle-config.sh debug"

      - name: Upload Debug build
        uses: actions/upload-artifact@v7
        with:
          name: angle-debug-linux-x64-${{ steps.source.outputs.short_commit }}
          path: |
            ${{ env.ARCHIVE_DIR }}/angle-debug-linux-x64-${{ steps.source.outputs.short_commit }}.zip
            ${{ env.ARCHIVE_DIR }}/angle-debug-linux-x64-${{ steps.source.outputs.short_commit }}.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: ${{ inputs.retention_days }}

      - name: Remove uploaded Debug package
        if: always()
        shell: bash
        run: rm -f "$ARCHIVE_DIR"/angle-debug-linux-x64-*.zip*

      - name: Build and package ASan
        shell: bash
        run: "$RUNNER_TEMP/build-angle-config.sh asan"

      - name: Upload ASan build
        uses: actions/upload-artifact@v7
        with:
          name: angle-asan-linux-x64-${{ steps.source.outputs.short_commit }}
          path: |
            ${{ env.ARCHIVE_DIR }}/angle-asan-linux-x64-${{ steps.source.outputs.short_commit }}.zip
            ${{ env.ARCHIVE_DIR }}/angle-asan-linux-x64-${{ steps.source.outputs.short_commit }}.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: ${{ inputs.retention_days }}

      - name: Remove uploaded ASan package
        if: always()
        shell: bash
        run: rm -f "$ARCHIVE_DIR"/angle-asan-linux-x64-*.zip*

      - name: Build and package UBSan
        shell: bash
        run: "$RUNNER_TEMP/build-angle-config.sh ubsan"

      - name: Upload UBSan build
        uses: actions/upload-artifact@v7
        with:
          name: angle-ubsan-linux-x64-${{ steps.source.outputs.short_commit }}
          path: |
            ${{ env.ARCHIVE_DIR }}/angle-ubsan-linux-x64-${{ steps.source.outputs.short_commit }}.zip
            ${{ env.ARCHIVE_DIR }}/angle-ubsan-linux-x64-${{ steps.source.outputs.short_commit }}.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: ${{ inputs.retention_days }}

      - name: Remove uploaded UBSan package
        if: always()
        shell: bash
        run: rm -f "$ARCHIVE_DIR"/angle-ubsan-linux-x64-*.zip*

      - name: Upload build logs and resolved GN arguments
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: angle-build-logs-${{ steps.source.outputs.short_commit || github.run_id }}
          path: |
            ${{ env.LOG_DIR }}
            ${{ runner.temp }}/depot-tools-bootstrap.txt
          if-no-files-found: warn
          compression-level: 6
          retention-days: ${{ inputs.retention_days }}
          
